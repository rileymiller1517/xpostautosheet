name: Post Mix (Images + Videos + Threads) to X — Sheet Driven
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */6 * * *"   # runs every 6 hours — edit to whatever cadence you want
jobs:
  post-mix:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: post-mix-to-x
      cancel-in-progress: false
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          pip install playwright gspread google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2
          playwright install --with-deps chromium
      - name: Run mixed poster (sheet-driven)
        env:
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
          ACCOUNTS_SPREADSHEET_ID: ${{ secrets.ACCOUNTS_SPREADSHEET_ID }}
        run: python post_mix_to_x.py
      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-mix
          path: debug_screenshots/
          if-no-files-found: ignore
          retention-days: 7
